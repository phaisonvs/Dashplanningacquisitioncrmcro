<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecionando...</title>
    <script>
      (function () {
        var basePath = '/Dashplanningacquisitioncrmcro/';
        var currentPath = window.location.pathname;
        var normalizedPath = currentPath.toLowerCase().indexOf(basePath.toLowerCase()) === 0
          ? currentPath.slice(basePath.length)
          : currentPath.replace(/^\/+/, '');
        normalizedPath = normalizedPath.replace(/^\/+|\/+$/g, '');

        var target = basePath + (normalizedPath ? '#/' + normalizedPath : '');
        window.location.replace(target);
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d0d0d;
        color: rgba(255, 255, 255, 0.7);
        font-family: Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <p>Redirecionando para a apresentação...</p>
  </body>
</html>
